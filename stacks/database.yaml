AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Database stack - RDS PostgreSQL instance with a Secrets Manager secret for
  credentials. The SecretTargetAttachment resource updates the secret with the
  DB endpoint once the instance is created, so the app can resolve all
  connection details from a single secret.

Parameters:
  Environment:
    Type: String

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  DBName:
    Type: String
    Default: photodb

  DBUsername:
    Type: String
    Default: dbadmin

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

Resources:

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for photo uploader RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-photo-uploader-db-subnet-group'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${Environment}/photo-uploader/db-credentials'
      Description: RDS PostgreSQL credentials for photo uploader
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}", "dbname": "${DBName}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: '16.4'
      DBName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-photo-uploader-db'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  SecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBInstance
      TargetType: AWS::RDS::DBInstance

Outputs:

  DBEndpoint:
    Description: RDS instance endpoint address
    Value: !GetAtt DBInstance.Endpoint.Address

  DBPort:
    Description: RDS instance port
    Value: !GetAtt DBInstance.Endpoint.Port

  DBName:
    Description: Database name
    Value: !Ref DBName

  DBSecretArn:
    Description: ARN of the Secrets Manager secret containing DB credentials
    Value: !Ref DBSecret
