AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repository for the photo uploader application image

Parameters:
  Environment:
    Type: String

Resources:

  Repository:
    Type: AWS::ECR::Repository
    Properties:
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": {"type": "expire"}
              },
              {
                "rulePriority": 2,
                "description": "Keep only the 5 most recent tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {"type": "expire"}
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-photo-uploader-app'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:

  RepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt Repository.RepositoryUri

  RepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt Repository.Arn

  RepositoryName:
    Description: ECR repository name
    Value: !Ref Repository
