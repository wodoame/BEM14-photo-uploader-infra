AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Storage stack - private S3 bucket for uploaded images and a CloudFront
  distribution with Origin Access Control (OAC) as the sole means of access.
  The bucket has no public access; all image reads go through CloudFront.

Parameters:
  Environment:
    Type: String

Resources:

  # ── S3 Image Bucket ───────────────────────────────────────────────────────────

  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-photo-uploader-images'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ── CloudFront Origin Access Control ─────────────────────────────────────────

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-photo-uploader-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────────────────────

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_200
        Origins:
          - Id: S3ImageOrigin
            DomainName: !GetAtt ImageBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3ImageOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-photo-uploader-cdn'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ── Bucket Policy ─────────────────────────────────────────────────────────────
  # Grants CloudFront (identified by the distribution ARN via OAC) read access.
  # No other principal can read objects directly from S3.

  ImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ImageBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:

  ImageBucketName:
    Description: S3 bucket name for uploaded images
    Value: !Ref ImageBucket

  ImageBucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt ImageBucket.Arn

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontDistributionArn:
    Description: CloudFront distribution ARN (used in IAM policies)
    Value: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
