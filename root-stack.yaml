AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BEM14 Photo Uploader - Root stack. Orchestrates all nested child stacks.
  Child templates must be uploaded to TemplatesBucketName before deploying.

Parameters:
  GithubOrg:
    Type: String
    Description: GitHub organisation or username that owns the app repository

  GithubAppRepo:
    Type: String
    Description: Name of the GitHub application repository (code + CI/CD)

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, dev]

  TemplatesBucketName:
    Type: String
    Description: S3 bucket that hosts the child stack templates under a stacks/ prefix

Resources:

  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/stacks/network.yaml'
      Parameters:
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: bem14-photo-uploader
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Environment
          Value: !Ref Environment

  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/stacks/security.yaml'
      Parameters:
        Environment: !Ref Environment
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
      Tags:
        - Key: Project
          Value: bem14-photo-uploader
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Environment
          Value: !Ref Environment

Outputs:

  VpcId:
    Description: VPC ID
    Value: !GetAtt NetworkStack.Outputs.VpcId

  PublicSubnet1Id:
    Description: Public Subnet 1
    Value: !GetAtt NetworkStack.Outputs.PublicSubnet1Id

  PublicSubnet2Id:
    Description: Public Subnet 2
    Value: !GetAtt NetworkStack.Outputs.PublicSubnet2Id

  PrivateSubnet1Id:
    Description: Private Subnet 1
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnet1Id

  PrivateSubnet2Id:
    Description: Private Subnet 2
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnet2Id

  ALBSecurityGroupId:
    Description: ALB security group
    Value: !GetAtt SecurityStack.Outputs.ALBSecurityGroupId

  ECSSecurityGroupId:
    Description: ECS tasks security group
    Value: !GetAtt SecurityStack.Outputs.ECSSecurityGroupId

  RDSSecurityGroupId:
    Description: RDS security group
    Value: !GetAtt SecurityStack.Outputs.RDSSecurityGroupId
